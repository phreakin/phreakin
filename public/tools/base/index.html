<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Developer Tools Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" rel="stylesheet">
  <link href="./tools.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <p class="text-uppercase text-info fw-semibold mb-1">Tools Base</p>
        <h1 class="display-6 fw-bold mb-2">Free Developer Tool Collection</h1>
        <p class="text-secondary mb-0">Modern, professional tools built with Bootstrap, Font Awesome, SweetAlert2, jQuery, Chart.js, and Highlight.js.</p>
      </div>
      <a href="/" class="btn btn-outline-light"><i class="fa-solid fa-arrow-left me-2"></i>Main Site</a>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-lg-8">
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-dark text-light border-secondary"><i class="fa-solid fa-magnifying-glass"></i></span>
          <input id="toolSearch" class="form-control bg-dark text-light border-secondary" placeholder="Search tools..." />
        </div>
      </div>
      <div class="col-lg-4">
        <button id="randomTool" class="btn btn-primary btn-lg w-100"><i class="fa-solid fa-shuffle me-2"></i>Open Random Tool</button>
      </div>
    </div>
    <div class="row g-4" id="toolsGrid"></div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="./tools.js"></script>
</body>
</html>
