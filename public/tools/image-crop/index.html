<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" rel="stylesheet">
  <style>body{background:#0b1220;color:#e5e7eb}.panel{background:#111827;border:1px solid #374151;border-radius:1rem}.muted{color:#9ca3af}</style>
</head>
<body>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4"><a href="/tools/base/" class="btn btn-outline-light"><i class="fa-solid fa-grid-2 me-2"></i>All Tools</a><button id="notify" class="btn btn-primary"><i class="fa-solid fa-bell me-2"></i>Demo Alert</button></div>
    <div class="panel p-4 mb-4">
      <h1 id="toolTitle" class="h2"></h1>
      <p id="toolDescription" class="muted mb-4"></p>
      <div class="row g-3">
        <div class="col-lg-6"><label class="form-label">Input</label><textarea id="inputText" class="form-control bg-dark text-light border-secondary" rows="6" placeholder="Use this starter workspace for your tool logic..."></textarea></div>
        <div class="col-lg-6"><label class="form-label">Output</label><textarea id="outputText" class="form-control bg-dark text-light border-secondary" rows="6" readonly></textarea></div>
      </div>
      <div class="mt-3 d-flex gap-2 flex-wrap"><button id="runTool" class="btn btn-success"><i class="fa-solid fa-play me-2"></i>Run Demo</button><button id="copyOutput" class="btn btn-outline-info"><i class="fa-solid fa-copy me-2"></i>Copy Output</button></div>
    </div>
    <div class="panel p-4"><h2 class="h5">Sample Configuration</h2><pre><code class="language-json" id="sampleCode"></code></pre><canvas id="toolChart" height="120"></canvas></div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script>
    const slug=window.location.pathname.split('/').filter(Boolean).pop();
    $.getJSON('/tools/tools.json', tools => {
      const tool=tools.find(t=>t.slug===slug) || {name:'Developer Tool',description:'Utility workspace'};
      document.title=`${tool.name} | Developer Tools`;
      $('#toolTitle').text(tool.name);
      $('#toolDescription').text(tool.description);
      const sample={tool:tool.name,free:true,frameworks:['Bootstrap','jQuery','SweetAlert2','Chart.js','Highlight.js']};
      $('#sampleCode').text(JSON.stringify(sample,null,2));
      hljs.highlightAll();
      new Chart(document.getElementById('toolChart'),{type:'line',data:{labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],datasets:[{label:'Usage',data:[3,5,4,7,8,6,9],borderColor:'#3b82f6',tension:.3}]},options:{plugins:{legend:{labels:{color:'#e5e7eb'}}},scales:{x:{ticks:{color:'#9ca3af'}},y:{ticks:{color:'#9ca3af'}}}}});
    });
    $('#runTool').on('click',()=>{const v=$('#inputText').val();$('#outputText').val(v?`Processed output:
${v.split('').reverse().join('')}`:'Add input text to test this tool workspace.');});
    $('#copyOutput').on('click',async()=>{await navigator.clipboard.writeText($('#outputText').val()||'');Swal.fire({icon:'success',title:'Copied',text:'Output copied to clipboard',timer:1200,showConfirmButton:false});});
    $('#notify').on('click',()=>Swal.fire({icon:'info',title:'Tool Ready',text:'This page is scaffolded and ready for feature-specific logic.'}));
  </script>
</body>
</html>
