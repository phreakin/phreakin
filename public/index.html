<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pop Culture Media Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="hero">
    <div class="hero__content">
      <p class="eyebrow">Media Pulse</p>
      <h1>Music, TV, Movies & Pop Culture — all in one place.</h1>
      <p class="lede">A live dashboard that tracks trusted entertainment feeds so you can keep up with what everyone is talking about.</p>
      <div class="controls">
        <div class="input-group">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8.75 15C12.2018 15 15 12.2018 15 8.75C15 5.29822 12.2018 2.5 8.75 2.5C5.29822 2.5 2.5 5.29822 2.5 8.75C2.5 12.2018 5.29822 15 8.75 15Z" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13.4717 13.4727L17.5 17.5009" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <input id="searchInput" type="search" placeholder="Search headlines or sources" aria-label="Search headlines" />
        </div>
        <div class="filter-row">
          <button class="chip active" data-category="All">All</button>
          <button class="chip" data-category="Music">Music</button>
          <button class="chip" data-category="TV">TV</button>
          <button class="chip" data-category="Movies">Movies</button>
          <button class="chip" data-category="Pop Culture">Pop Culture</button>
        </div>
        <div class="meta">
          <span id="status">Loading latest stories...</span>
          <div class="actions">
            <button id="refreshBtn" class="button button--ghost">Refresh</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="grid" id="feedGrid" aria-live="polite"></section>
    <template id="cardTemplate">
      <article class="card">
        <div class="card__meta">
          <span class="badge"></span>
          <time></time>
        </div>
        <h2></h2>
        <p class="card__summary"></p>
        <div class="card__footer">
          <span class="source"></span>
          <a class="cta" target="_blank" rel="noopener">Read</a>
        </div>
      </article>
    </template>
  </main>

  <div class="toast" id="toast" role="status" aria-live="assertive"></div>

  <script src="app.js"></script>
</body>
</html>
